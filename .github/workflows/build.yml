name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [created]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Validate addon.xml
      run: |
        python -c "
        import xml.etree.ElementTree as ET
        try:
            tree = ET.parse('addon.xml')
            print('✓ addon.xml is valid XML')
        except ET.ParseError as e:
            print(f'✗ addon.xml parse error: {e}')
            exit(1)
        "
    
    - name: Check addon structure
      run: |
        required_files=("addon.xml" "resources/lib/plugin.py" "resources/lib/service.py")
        for file in "${required_files[@]}"; do
          if [ -f "$file" ]; then
            echo "✓ $file exists"
          else
            echo "✗ $file missing"
            exit 1
          fi
        done
    
    - name: Test imports with mocked Kodi environment
      run: |
        cd resources/lib
        export PYTHONPATH="../../test:$PYTHONPATH"
        python -c "
        import sys
        sys.path.insert(0, '../../test')
        sys.path.insert(0, '.')
        
        # Import mock_kodi first to set up mocks
        import mock_kodi
        
        try:
            import plugin
            import service
            print('✓ All imports successful')
        except ImportError as e:
            print(f'✗ Import error: {e}')
            import traceback
            traceback.print_exc()
            sys.exit(1)
        "
    
    - name: Run tests
      run: |
        if [ -d "test" ] && [ -f "test/test_*.py" ] || find test -name "test_*.py" -type f | grep -q .; then
          export PYTHONPATH="test:$PYTHONPATH"
          python -m pytest test/ -v
        else
          echo "No tests found, skipping test execution"
        fi

  package:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Get addon info
      id: addon_info
      run: |
        VERSION=$(grep -o 'version="[^"]*"' addon.xml | cut -d'"' -f2)
        NAME=$(grep -o 'id="[^"]*"' addon.xml | cut -d'"' -f2)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "name=$NAME" >> $GITHUB_OUTPUT
    
    - name: Create addon package
      run: |
        mkdir -p dist
        # Create a clean copy without development files
        rsync -av --exclude='.git*' --exclude='test/' --exclude='dist/' --exclude='*.pyc' --exclude='__pycache__/' . dist/${{ steps.addon_info.outputs.name }}/
        cd dist
        zip -r ${{ steps.addon_info.outputs.name }}-${{ steps.addon_info.outputs.version }}.zip ${{ steps.addon_info.outputs.name }}/
        
        # Create checksum
        sha256sum ${{ steps.addon_info.outputs.name }}-${{ steps.addon_info.outputs.version }}.zip > ${{ steps.addon_info.outputs.name }}-${{ steps.addon_info.outputs.version }}.zip.sha256
    
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./dist/${{ steps.addon_info.outputs.name }}-${{ steps.addon_info.outputs.version }}.zip
        asset_name: ${{ steps.addon_info.outputs.name }}-${{ steps.addon_info.outputs.version }}.zip
        asset_content_type: application/zip
    
    - name: Upload Checksum
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./dist/${{ steps.addon_info.outputs.name }}-${{ steps.addon_info.outputs.version }}.zip.sha256
        asset_name: ${{ steps.addon_info.outputs.name }}-${{ steps.addon_info.outputs.version }}.zip.sha256
        asset_content_type: text/plain
