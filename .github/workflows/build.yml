name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mock
        
    - name: Create mock Kodi modules
      run: |
        mkdir -p kodi_mocks
        cat > kodi_mocks/xbmc.py << 'EOF'
        # Mock xbmc module for testing
        LOGDEBUG = 0
        LOGINFO = 1
        LOGWARNING = 2
        LOGERROR = 3
        LOGFATAL = 4
        
        def log(msg, level=LOGDEBUG):
            print(f"[KODI LOG {level}] {msg}")
            
        def getInfoLabel(label):
            return "mock_info"
            
        def executeJSONRPC(request):
            return '{"result": "mock"}'
            
        def sleep(milliseconds):
            import time
            time.sleep(milliseconds / 1000.0)
            
        def translatePath(path):
            return path.replace('special://', '/mock/')
            
        def getCondVisibility(condition):
            return False
        EOF
        
        cat > kodi_mocks/xbmcgui.py << 'EOF'
        # Mock xbmcgui module for testing
        class ListItem:
            def __init__(self, label="", label2="", path=""):
                self.label = label
                self.label2 = label2
                self.path = path
                self.art = {}
                self.info = {}
                self.properties = {}
                
            def setArt(self, values):
                self.art.update(values)
                
            def setInfo(self, type, infoLabels):
                self.info[type] = infoLabels
                
            def setProperty(self, key, value):
                self.properties[key] = value
                
            def getProperty(self, key):
                return self.properties.get(key, "")
        
        class Dialog:
            def ok(self, heading, message):
                print(f"Dialog OK: {heading} - {message}")
                return True
                
            def yesno(self, heading, message):
                print(f"Dialog YESNO: {heading} - {message}")
                return True
                
            def notification(self, heading, message, icon="", time=5000):
                print(f"Notification: {heading} - {message}")
                
            def input(self, heading, defaultt="", type=0, option=0, autoclose=0):
                return "mock_input"
                
            def select(self, heading, list, autoclose=0, preselect=-1, useDetails=False):
                return 0
        
        class DialogProgress:
            def __init__(self):
                self.percent = 0
                
            def create(self, heading, message=""):
                print(f"Progress Dialog: {heading} - {message}")
                
            def update(self, percent, message=""):
                self.percent = percent
                print(f"Progress: {percent}% - {message}")
                
            def iscanceled(self):
                return False
                
            def close(self):
                print("Progress Dialog closed")
        
        def getCurrentWindowId():
            return 10000
        EOF
        
        cat > kodi_mocks/xbmcplugin.py << 'EOF'
        # Mock xbmcplugin module for testing
        SORT_METHOD_LABEL = 1
        SORT_METHOD_DATE = 3
        SORT_METHOD_DURATION = 9
        
        def addDirectoryItem(handle, url, listitem, isFolder=False, totalItems=0):
            print(f"Added directory item: {url} - {listitem.label}")
            return True
            
        def endOfDirectory(handle, succeeded=True, updateListing=False, cacheToDisc=True):
            print(f"End of directory: handle={handle}, success={succeeded}")
            
        def setContent(handle, content):
            print(f"Set content: {content}")
            
        def addSortMethod(handle, sortMethod):
            print(f"Added sort method: {sortMethod}")
            
        def setPluginCategory(handle, category):
            print(f"Set category: {category}")
            
        def setPluginFanart(handle, image="", color1=None, color2=None, color3=None):
            print(f"Set fanart: {image}")
        EOF
        
        cat > kodi_mocks/xbmcaddon.py << 'EOF'
        # Mock xbmcaddon module for testing
        class Addon:
            def __init__(self, id=None):
                self.id = id or "plugin.audio.audiobookshelf"
                self.settings = {
                    'server_url': 'http://localhost:13378',
                    'api_token': 'mock_token',
                    'sync_interval': '30',
                    'auto_resume': 'true',
                    'mark_finished_threshold': '10',
                    'show_descriptions': 'true',
                    'episodes_per_page': '50',
                    'sort_episodes': 'newest'
                }
                
            def getSetting(self, id):
                return self.settings.get(id, "")
                
            def setSetting(self, id, value):
                self.settings[id] = value
                
            def getAddonInfo(self, id):
                info_map = {
                    'id': self.id,
                    'name': 'Audiobookshelf',
                    'version': '1.0.0',
                    'path': '/mock/addon/path',
                    'profile': '/mock/addon/profile',
                    'icon': '/mock/addon/icon.png',
                    'fanart': '/mock/addon/fanart.jpg'
                }
                return info_map.get(id, "")
                
            def getLocalizedString(self, id):
                return f"Localized string {id}"
                
            def openSettings(self):
                print("Opening addon settings")
        EOF
        
        cat > kodi_mocks/xbmcvfs.py << 'EOF'
        # Mock xbmcvfs module for testing
        import os
        import tempfile
        
        def exists(path):
            mock_path = path.replace('special://', tempfile.gettempdir() + '/')
            return os.path.exists(mock_path)
            
        def mkdir(path):
            mock_path = path.replace('special://', tempfile.gettempdir() + '/')
            os.makedirs(mock_path, exist_ok=True)
            return True
            
        def mkdirs(path):
            return mkdir(path)
            
        def delete(file):
            mock_path = file.replace('special://', tempfile.gettempdir() + '/')
            if os.path.exists(mock_path):
                os.remove(mock_path)
            return True
            
        def copy(source, destination):
            print(f"Mock copy: {source} -> {destination}")
            return True
            
        def rename(file, newFileName):
            print(f"Mock rename: {file} -> {newFileName}")
            return True
            
        def listdir(path):
            mock_path = path.replace('special://', tempfile.gettempdir() + '/')
            if os.path.exists(mock_path):
                return os.listdir(mock_path), []
            return [], []
            
        class File:
            def __init__(self, filepath, mode='r'):
                self.filepath = filepath
                self.mode = mode
                self.content = ""
                
            def read(self, bytes=-1):
                return self.content
                
            def write(self, data):
                self.content += data
                return len(data)
                
            def close(self):
                pass
                
            def __enter__(self):
                return self
                
            def __exit__(self, type, value, traceback):
                self.close()
        EOF

    - name: Test imports with mocked Kodi modules
      run: |
        cd resources/lib
        export PYTHONPATH="../../kodi_mocks:$PYTHONPATH"
        python -c "
        import sys
        sys.path.insert(0, '../../kodi_mocks')
        sys.path.insert(0, '.')
        try:
            # Test individual module imports first
            import xbmc
            import xbmcgui
            import xbmcplugin
            import xbmcaddon
            import xbmcvfs
            print('✓ All Kodi mock modules imported successfully')
            
            # Now test the actual plugin modules
            import plugin
            import service
            print('✓ All plugin modules imported successfully')
            
            # Test basic functionality if possible
            addon = xbmcaddon.Addon()
            print(f'✓ Mock addon created: {addon.getAddonInfo(\"name\")}')
            
        except ImportError as e:
            print(f'✗ Import error: {e}')
            import traceback
            traceback.print_exc()
            sys.exit(1)
        except Exception as e:
            print(f'✗ General error: {e}')
            import traceback
            traceback.print_exc()
            sys.exit(1)
        "

    - name: Validate addon.xml structure
      run: |
        if [ -f addon.xml ]; then
          python -c "
          import xml.etree.ElementTree as ET
          try:
              tree = ET.parse('addon.xml')
              root = tree.getroot()
              print(f'✓ addon.xml is valid XML')
              print(f'  - Addon ID: {root.get(\"id\")}')
              print(f'  - Version: {root.get(\"version\")}')
              print(f'  - Name: {root.get(\"name\")}')
          except ET.ParseError as e:
              print(f'✗ addon.xml parse error: {e}')
              exit(1)
          except Exception as e:
              print(f'✗ addon.xml validation error: {e}')
              exit(1)
          "
        else
          echo "✗ addon.xml not found"
          exit 1
        fi

    - name: Check for required files
      run: |
        echo "Checking for required files..."
        required_files=(
          "addon.xml"
          "resources/lib/plugin.py"
          "resources/lib/service.py"
        )
        
        missing_files=()
        for file in "${required_files[@]}"; do
          if [ -f "$file" ]; then
            echo "✓ Found: $file"
          else
            echo "✗ Missing: $file"
            missing_files+=("$file")
          fi
        done
        
        if [ ${#missing_files[@]} -ne 0 ]; then
          echo "Missing required files:"
          printf '  - %s\n' "${missing_files[@]}"
          exit 1
        fi
        
        echo "✓ All required files present"

    - name: Lint Python files (optional)
      run: |
        # Install basic linting tools
        pip install pycodestyle pyflakes
        
        echo "Running basic Python syntax checks..."
        find . -name "*.py" -not -path "./kodi_mocks/*" -exec python -m py_compile {} \;
        echo "✓ All Python files compile successfully"
        
        # Optional: Run pyflakes for basic static analysis
        echo "Running pyflakes analysis..."
        find . -name "*.py" -not -path "./kodi_mocks/*" -exec pyflakes {} \; || true
        
        echo "✓ Linting completed"

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Create addon package
      run: |
        # Get addon info from addon.xml
        ADDON_ID=$(python -c "import xml.etree.ElementTree as ET; print(ET.parse('addon.xml').getroot().get('id'))")
        ADDON_VERSION=$(python -c "import xml.etree.ElementTree as ET; print(ET.parse('addon.xml').getroot().get('version'))")
        
        echo "Building addon: $ADDON_ID v$ADDON_VERSION"
        
        # Create package directory
        mkdir -p "build/$ADDON_ID"
        
        # Copy addon files (exclude development files)
        rsync -av --exclude='.git*' --exclude='build/' --exclude='kodi_mocks/' \
                  --exclude='*.pyc' --exclude='__pycache__/' \
                  --exclude='.pytest_cache/' --exclude='tests/' \
                  . "build/$ADDON_ID/"
        
        # Create zip package
        cd build
        zip -r "../${ADDON_ID}-${ADDON_VERSION}.zip" "$ADDON_ID/"
        
        echo "✓ Package created: ${ADDON_ID}-${ADDON_VERSION}.zip"
        
        # Generate checksums
        cd ..
        sha256sum "${ADDON_ID}-${ADDON_VERSION}.zip" > "${ADDON_ID}-${ADDON_VERSION}.zip.sha256"
        md5sum "${ADDON_ID}-${ADDON_VERSION}.zip" > "${ADDON_ID}-${ADDON_VERSION}.zip.md5"
        
        echo "✓ Checksums generated"
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: addon-package
        path: |
          *.zip
          *.sha256
          *.md5
        retention-days: 30
