name: Build and Test Audiobookshelf Addon

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

# CRITICAL: Add permissions for creating releases
permissions:
  contents: write
  actions: read

jobs:
  validate:
    name: Validate Addon
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install kodi-addon-checker
          
      - name: Check addon for Kodi Omega
        run: kodi-addon-checker --branch=omega .
        
      - name: Check addon structure
        run: |
          echo "Checking required files..."
          test -f addon.xml || (echo "addon.xml missing" && exit 1)
          test -f main.py || (echo "main.py missing" && exit 1)
          test -f service.py || (echo "service.py missing" && exit 1)
          test -f resources/lib/plugin.py || (echo "resources/lib/plugin.py missing" && exit 1)
          test -f resources/lib/service.py || (echo "resources/lib/service.py missing" && exit 1)
          test -f icon.png || (echo "icon.png missing" && exit 1)
          echo "All required files present"
          
      - name: Validate Python syntax
        run: |
          python -m py_compile main.py
          python -m py_compile service.py
          python -m py_compile resources/lib/plugin.py
          python -m py_compile resources/lib/service.py
          echo "Python syntax validation passed"

  build:
    name: Build Release Package
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "TAG_NAME=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"
          
      - name: Update addon.xml version
        run: |
          sed -i "s/version=\"[^\"]*\"/version=\"${{ steps.get_version.outputs.VERSION }}\"/" addon.xml
          echo "Updated addon.xml version to ${{ steps.get_version.outputs.VERSION }}"
          
      - name: Create release package
        run: |
          # Create clean build directory
          mkdir -p build
          
          # Copy addon files to properly named directory
          cp -r . build/plugin.audio.audiobookshelf/
          
          # Remove unnecessary files from package
          cd build/plugin.audio.audiobookshelf
          find . -name "*.pyc" -delete
          find . -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          rm -rf .git .github .gitignore README.md build
          
          # Create zip package
          cd ..
          zip -r plugin.audio.audiobookshelf-${{ steps.get_version.outputs.VERSION }}.zip plugin.audio.audiobookshelf/
          
          # Generate checksums
          cd ..
          sha256sum build/plugin.audio.audiobookshelf-${{ steps.get_version.outputs.VERSION }}.zip > build/plugin.audio.audiobookshelf-${{ steps.get_version.outputs.VERSION }}.zip.sha256
          md5sum build/plugin.audio.audiobookshelf-${{ steps.get_version.outputs.VERSION }}.zip > build/plugin.audio.audiobookshelf-${{ steps.get_version.outputs.VERSION }}.zip.md5
          
          echo "Package created: plugin.audio.audiobookshelf-${{ steps.get_version.outputs.VERSION }}.zip"
          
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-release-${{ steps.get_version.outputs.VERSION }}
          path: |
            build/plugin.audio.audiobookshelf-${{ steps.get_version.outputs.VERSION }}.zip
            build/plugin.audio.audiobookshelf-${{ steps.get_version.outputs.VERSION }}.zip.sha256
            build/plugin.audio.audiobookshelf-${{ steps.get_version.outputs.VERSION }}.zip.md5
          retention-days: 90
          
      # FIXED: Use modern release action instead of deprecated ones
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.TAG_NAME }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Audiobookshelf Kodi Addon v${{ steps.get_version.outputs.VERSION }}
            
            ### Installation
            1. Download `plugin.audio.audiobookshelf-${{ steps.get_version.outputs.VERSION }}.zip`
            2. In Kodi, go to Settings → Add-ons → Install from zip file
            3. Select the downloaded zip file
            4. Configure your Audiobookshelf server settings
            
            ### Requirements
            - Kodi 21.0+ (Omega)
            - Audiobookshelf server
            - Valid API token
            
            ### Features
            - 🎧 Stream podcasts from your Audiobookshelf server
            - 🔄 Full progress synchronization across devices
            - 📱 Resume episodes where you left off
            - 🆕 Browse recent episodes across all podcasts
            - ⏯️ View and continue in-progress episodes
            - 🎨 Rich metadata display with cover art
            
            ### Changelog
            - Compatible with Kodi v21.2 (Omega)
            - Fixed GitHub Actions workflow
            - Improved error handling
            - Updated API integration
            
            ### Files
            - `plugin.audio.audiobookshelf-${{ steps.get_version.outputs.VERSION }}.zip` - Main addon package
            - `plugin.audio.audiobookshelf-${{ steps.get_version.outputs.VERSION }}.zip.sha256` - SHA256 checksum
            - `plugin.audio.audiobookshelf-${{ steps.get_version.outputs.VERSION }}.zip.md5` - MD5 checksum
          files: |
            build/plugin.audio.audiobookshelf-${{ steps.get_version.outputs.VERSION }}.zip
            build/plugin.audio.audiobookshelf-${{ steps.get_version.outputs.VERSION }}.zip.sha256
            build/plugin.audio.audiobookshelf-${{ steps.get_version.outputs.VERSION }}.zip.md5
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test Installation
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: Test Python imports
        run: |
          cd resources/lib
          python -c "
          import sys
          sys.path.insert(0, '.')
          try:
              import plugin
              import service
              print('✓ All imports successful')
          except ImportError as e:
              print(f'✗ Import error: {e}')
              sys.exit(1)
          "
          
      - name: Validate addon structure
        run: |
          echo "Validating directory structure..."
          # Check main files
          [ -f "main.py" ] && echo "✓ main.py exists" || (echo "✗ main.py missing" && exit 1)
          [ -f "service.py" ] && echo "✓ service.py exists" || (echo "✗ service.py missing" && exit 1)
          [ -f "addon.xml" ] && echo "✓ addon.xml exists" || (echo "✗ addon.xml missing" && exit 1)
          
          # Check resources directory
          [ -d "resources" ] && echo "✓ resources directory exists" || (echo "✗ resources directory missing" && exit 1)
          [ -d "resources/lib" ] && echo "✓ resources/lib directory exists" || (echo "✗ resources/lib directory missing" && exit 1)
          [ -f "resources/lib/plugin.py" ] && echo "✓ resources/lib/plugin.py exists" || (echo "✗ resources/lib/plugin.py missing" && exit 1)
          [ -f "resources/lib/service.py" ] && echo "✓ resources/lib/service.py exists" || (echo "✗ resources/lib/service.py missing" && exit 1)
          
          # Check file sizes (entry points should be small)
          MAIN_LINES=$(wc -l < main.py)
          SERVICE_LINES=$(wc -l < service.py)
          echo "main.py has $MAIN_LINES lines (should be ≤15)"
          echo "service.py has $SERVICE_LINES lines (should be ≤15)"
          [ $MAIN_LINES -le 15 ] && echo "✓ main.py size OK" || echo "⚠ main.py may be too complex"
          [ $SERVICE_LINES -le 15 ] && echo "✓ service.py size OK" || echo "⚠ service.py may be too complex"
          
          echo "Structure validation complete"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
          
      - name: Run security scan with Bandit
        run: |
          echo "Running security scan..."
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . || echo "Security scan completed with warnings"
          
      - name: Check for known vulnerabilities
        run: |
          echo "Checking for known vulnerabilities..."
          # Create a requirements file for safety check
          echo "requests" > temp-requirements.txt
          safety check -r temp-requirements.txt || echo "Safety check completed"
          
      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: bandit-report.json
          retention-days: 30
